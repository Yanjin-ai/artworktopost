<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>作品 Post 生成器 ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Fredoka:wght@400;500;600&family=Mr+Dafoe&family=Mrs+Saint+Delafield&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#f7f3ec; --ink:#3d3a44; --soft:#9b97a1; --line:#e7e0d6; --card:#fff; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{ background:var(--paper); color:var(--ink); font-family:"Fredoka",system-ui,sans-serif; line-height:1.6; padding:26px; }
  .serif{font-family:"Fraunces",Georgia,serif}
  .top{display:flex; align-items:flex-start; justify-content:space-between; max-width:1160px; margin:0 auto 24px;}
  h1{font-family:"Fraunces",serif; font-weight:500; font-size:28px; letter-spacing:-.01em; display:flex; align-items:center; gap:10px;}
  h1 .dot{width:13px;height:13px;border-radius:50%; background:var(--ink);}
  .sub{color:var(--soft); font-size:13.5px; margin-top:5px;}
  .langsel{display:flex; gap:6px;}
  .langsel button{font-family:inherit; font-size:13px; padding:6px 12px; border-radius:8px; cursor:pointer;
    background:#fff; border:1px solid var(--line); color:var(--soft); transition:.15s;}
  .langsel button.on{background:var(--ink); color:#fff; border-color:var(--ink);}

  .app{display:grid; grid-template-columns:368px 1fr; gap:32px; max-width:1160px; margin:0 auto; align-items:start;}
  @media(max-width:900px){ .app{grid-template-columns:1fr} }
  .panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px;}
  .panel + .panel{margin-top:18px;}
  .ptitle{font-family:"Fraunces",serif; font-size:16px; font-weight:600; margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .ptitle::before{content:""; width:7px;height:7px;border-radius:50%;background:var(--ink);}
  .field{margin-bottom:15px;} .field:last-child{margin-bottom:0;}
  label{display:block; font-size:12.5px; font-weight:500; color:var(--soft); margin-bottom:6px; letter-spacing:.03em;}
  input[type=text], input[type=date], textarea{ width:100%; font-family:inherit; font-size:14.5px; color:var(--ink);
    background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:10px 12px; transition:border-color .15s; }
  input:focus, textarea:focus{outline:none; border-color:var(--ink);}
  textarea{resize:vertical; min-height:74px; line-height:1.5;}

  .drop{border:1.5px dashed var(--line); border-radius:12px; padding:18px; text-align:center; color:var(--soft); cursor:pointer; transition:.18s; background:var(--paper); font-size:14px;}
  .drop:hover,.drop.over{border-color:var(--ink); color:var(--ink); background:#fff;}
  .drop b{color:var(--ink);}

  /* works list */
  .works{display:flex; gap:10px; flex-wrap:wrap;}
  .wk{position:relative; width:66px; height:66px; border-radius:10px; overflow:hidden; cursor:pointer;
    border:2px solid var(--line); background:var(--paper); display:flex; align-items:center; justify-content:center; transition:.15s;}
  .wk.on{border-color:var(--ink);}
  .wk img{width:100%;height:100%;object-fit:cover;}
  .wk .ph{font-size:20px; color:var(--soft);}
  .wk .rm{position:absolute; top:2px; right:2px; width:17px;height:17px; border-radius:50%; background:rgba(61,58,68,.78); color:#fff;
    font-size:12px; line-height:17px; text-align:center; opacity:0; transition:.15s;}
  .wk:hover .rm{opacity:1;}
  .wk .idx{position:absolute; bottom:2px; left:2px; min-width:15px;height:15px; padding:0 3px; border-radius:5px; background:rgba(61,58,68,.7); color:#fff; font-size:10px; line-height:15px; text-align:center; font-weight:600;}
  .wk.drag{opacity:.4;}
  .wk.add{font-size:24px; color:var(--soft); border-style:dashed;}
  .wk.add:hover{border-color:var(--ink); color:var(--ink);}

  .swatches{display:flex; gap:9px; flex-wrap:wrap;}
  .sw{width:27px;height:27px;border-radius:50%;cursor:pointer;border:3px solid #fff;box-shadow:0 0 0 1px var(--line);transition:transform .12s;}
  .sw:hover{transform:scale(1.12);} .sw.on{box-shadow:0 0 0 2px var(--ink);transform:scale(1.12);}

  .seg{display:flex; gap:7px;}
  .seg button{flex:1; font-family:inherit; font-size:13px; font-weight:500; padding:9px 4px; cursor:pointer; background:var(--paper); border:1px solid var(--line); border-radius:9px; color:var(--soft); transition:.15s; white-space:nowrap;}
  .seg button.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  #signFont button{font-size:18px; padding:7px 4px;}
  #signFont button[data-f*="Dafoe"]{font-family:'Mr Dafoe',cursive;}
  #signFont button[data-f*="Delafield"]{font-family:'Mrs Saint Delafield',cursive; font-size:21px;}
  #signFont button[data-f*="Pinyon"]{font-family:'Pinyon Script',cursive; font-size:19px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .captionbox{background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:13px; color:#6b6675; white-space:pre-wrap; max-height:150px; overflow:auto; line-height:1.55;}
  .btn{font-family:inherit; font-weight:500; font-size:14.5px; cursor:pointer; border:none; padding:12px; border-radius:11px; transition:.15s; width:100%;}
  .btn.primary{background:var(--ink); color:#fff;} .btn.primary:hover{opacity:.85;}
  .btn.line{background:#fff; border:1px solid var(--line); color:var(--ink);} .btn.line:hover{border-color:var(--ink);}
  .btn:disabled{opacity:.5; cursor:default;}
  .btnrow{display:flex; gap:10px; margin-top:10px;}

  .stage{position:sticky; top:26px; display:flex; flex-direction:column; align-items:center; gap:14px;}
  .modetabs{display:flex; gap:8px;}
  .modetabs button{font-family:inherit; font-size:13.5px; padding:8px 18px; border-radius:20px; cursor:pointer; background:#fff; border:1px solid var(--line); color:var(--soft); transition:.15s;}
  .modetabs button.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .canvas-wrap{background:#fff; border-radius:6px; border:1px solid var(--line); overflow:hidden; box-shadow:0 16px 40px -26px rgba(61,58,68,.5);}
  canvas{display:block; width:100%; height:auto; max-width:430px;}
  .hint{font-size:12px; color:var(--soft); text-align:center; max-width:430px; line-height:1.5;}
  .small{font-size:11.5px;}
</style>
</head>
<body>

<div class="top">
  <div>
    <h1><span class="dot"></span><span data-i18n="appTitle">作品 Post 生成器</span></h1>
    <p class="sub serif" style="font-style:italic;color:#6b6675;" data-i18n="appSub"></p>
  </div>
  <div class="langsel" id="langsel">
    <button data-l="zh" class="on">中文</button>
    <button data-l="en">EN</button>
    <button data-l="ja">日本語</button>
  </div>
</div>

<div class="app">
  <!-- ============ 左：控制 ============ -->
  <div>
    <!-- 作品 -->
    <div class="panel">
      <div class="ptitle" data-i18n="secWorks">作品</div>
      <div class="field">
        <div class="works" id="works"></div>
      </div>
      <div class="field">
        <div class="drop" id="drop"><b data-i18n="upload">上传 / 替换当前作品</b><input type="file" id="file" accept="image/*" hidden></div>
      </div>
      <div class="field">
        <label data-i18n="lblTitle">作品标题</label>
        <input type="text" id="title" maxlength="40">
      </div>
      <div class="field">
        <label data-i18n="lblIdea">创作理念</label>
        <textarea id="idea" maxlength="240"></textarea>
      </div>
      <div class="field">
        <label data-i18n="lblDate">日期</label>
        <input type="date" id="date">
      </div>
    </div>

    <!-- 统一风格 -->
    <div class="panel">
      <div class="ptitle" data-i18n="secStyle">统一风格（应用于全部作品）</div>
      <div class="field">
        <label data-i18n="lblSign">签名</label>
        <input type="text" id="sign" maxlength="24">
      </div>
      <div class="field">
        <label data-i18n="lblSignFont">签名字体</label>
        <div class="seg" id="signFont">
          <button data-f="'Mr Dafoe', cursive" class="on">Dafoe</button>
          <button data-f="'Mrs Saint Delafield', cursive">Delafield</button>
          <button data-f="'Pinyon Script', cursive">Pinyon</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="lblInk">墨色</label>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="row2">
        <div class="field">
          <label data-i18n="lblMargin">留白</label>
          <div class="seg" id="margin">
            <button data-m="0.05" data-i18n="mTight">紧凑</button>
            <button data-m="0.085" class="on" data-i18n="mStd">标准</button>
            <button data-m="0.13" data-i18n="mRoomy">宽松</button>
          </div>
        </div>
        <div class="field">
          <label data-i18n="lblAlign">对齐</label>
          <div class="seg" id="textAlign">
            <button data-a="left" class="on" data-i18n="aLeft">左</button>
            <button data-a="center" data-i18n="aCenter">中</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 文案 + 标签 -->
    <div class="panel">
      <div class="ptitle" data-i18n="secCaption">发布文案 / 话题标签</div>
      <div class="field">
        <label data-i18n="lblSeries">系列标题（用于合集 / 视频）</label>
        <input type="text" id="seriesTitle" maxlength="40">
      </div>
      <div class="field">
        <label data-i18n="lblTags">话题标签 #</label>
        <textarea id="hashtags" style="min-height:58px"></textarea>
      </div>
      <div class="field">
        <label data-i18n="lblCaptionPreview">文案预览</label>
        <div class="captionbox" id="captionbox"></div>
      </div>
      <button class="btn line" id="copyCap" data-i18n="copyCap">复制文案</button>
    </div>
  </div>

  <!-- ============ 右：预览 / 导出 ============ -->
  <div class="stage">
    <div class="modetabs" id="modetabs">
      <button data-mode="single" class="on" data-i18n="modeSingle">单幅</button>
      <button data-mode="grid" data-i18n="modeGrid">系列合集</button>
    </div>
    <div class="canvas-wrap"><canvas id="cv" width="1080" height="1350"></canvas></div>
    <div style="width:100%; max-width:430px;">
      <button class="btn primary" id="exportPng" data-i18n="exportPng">⬇ 导出当前图片 PNG</button>
      <div class="btnrow">
        <button class="btn line" id="playPreview" style="flex:0 0 120px;">▶ 预览</button>
        <div class="seg" id="videoSecs" style="flex:1;">
          <button data-s="2" data-i18n="s2">2秒</button>
          <button data-s="2.8" class="on" data-i18n="s3">2.8秒</button>
          <button data-s="4" data-i18n="s4">4秒</button>
        </div>
      </div>
      <button class="btn line" id="exportVideo" style="margin-top:10px;" data-i18n="exportVideo">🎬 导出幻灯片视频 (mp4)</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>
</div>

<script>
// ---------------- i18n ----------------
const LANG = {
  zh:{ appTitle:'作品 Post 生成器', appSub:'极简画框 · 统一字体 · 个性签名 — 按原图比例呈现，一键导出',
    secWorks:'作品（可添加多幅，组成系列）', upload:'上传 / 替换当前作品', lblTitle:'作品标题', lblIdea:'创作理念', lblDate:'日期',
    secStyle:'统一风格（应用于全部作品）', lblSign:'签名', lblSignFont:'签名字体', lblInk:'墨色', lblMargin:'留白', lblAlign:'对齐',
    mTight:'紧凑', mStd:'标准', mRoomy:'宽松', aLeft:'左', aCenter:'中',
    secCaption:'发布文案 / 话题标签', lblSeries:'系列标题（用于合集 / 视频）', lblTags:'话题标签 #', lblCaptionPreview:'文案预览', copyCap:'复制文案', copied:'✓ 已复制',
    modeSingle:'单幅', modeGrid:'系列合集', exportPng:'⬇ 导出当前图片 PNG', exportVideo:'🎬 导出幻灯片视频 (mp4)',
    s2:'2秒', s3:'2.8秒', s4:'4秒', untitled:'无题', uploadHere:'上传你的作品（按原图比例）', play:'预览', stop:'停止',
    hint:'本地网页文件，双击即用，无需部署。图片与设置已本地保存，刷新/关闭也不会丢图。作品条可拖动排序（即幻灯片顺序），▶ 预览，视频导出为 mp4。',
    generating:'生成中…', needImg:'请先上传至少一幅作品', videoDone:'✓ 视频已生成' },
  en:{ appTitle:'Artwork Post Maker', appSub:'Minimal frame · unified type · signature — true to your original ratio, export in one click',
    secWorks:'Works (add several to form a series)', upload:'Upload / replace current work', lblTitle:'Title', lblIdea:'Statement', lblDate:'Date',
    secStyle:'Shared style (applies to every work)', lblSign:'Signature', lblSignFont:'Signature font', lblInk:'Ink', lblMargin:'Margin', lblAlign:'Align',
    mTight:'Tight', mStd:'Std', mRoomy:'Roomy', aLeft:'Left', aCenter:'Center',
    secCaption:'Caption / hashtags', lblSeries:'Series title (for grid / video)', lblTags:'Hashtags #', lblCaptionPreview:'Caption preview', copyCap:'Copy caption', copied:'✓ Copied',
    modeSingle:'Single', modeGrid:'Series grid', exportPng:'⬇ Export current image PNG', exportVideo:'🎬 Export slideshow (mp4)',
    s2:'2s', s3:'2.8s', s4:'4s', untitled:'Untitled', uploadHere:'Upload your artwork (kept at original ratio)', play:'Preview', stop:'Stop',
    hint:'A local HTML file — double-click to use, no deployment. Images & settings are saved locally, so nothing is lost on reload. Drag the work chips to reorder (slideshow order); ▶ to preview; video exports as mp4.',
    generating:'Generating…', needImg:'Please upload at least one work first', videoDone:'✓ Video ready' },
  ja:{ appTitle:'作品ポスト メーカー', appSub:'極簡な額装 · 統一書体 · 署名 — 原図の比率のまま、ワンクリックで書き出し',
    secWorks:'作品（複数追加でシリーズに）', upload:'現在の作品をアップロード / 差し替え', lblTitle:'タイトル', lblIdea:'制作意図', lblDate:'日付',
    secStyle:'共通スタイル（全作品に適用）', lblSign:'署名', lblSignFont:'署名書体', lblInk:'墨色', lblMargin:'余白', lblAlign:'揃え',
    mTight:'狭い', mStd:'標準', mRoomy:'広い', aLeft:'左', aCenter:'中央',
    secCaption:'投稿文 / ハッシュタグ', lblSeries:'シリーズ名（合集 / 動画用）', lblTags:'ハッシュタグ #', lblCaptionPreview:'投稿文プレビュー', copyCap:'投稿文をコピー', copied:'✓ コピー済み',
    modeSingle:'1枚', modeGrid:'シリーズ合集', exportPng:'⬇ 現在の画像を PNG 書き出し', exportVideo:'🎬 スライドショー書き出し (mp4)',
    s2:'2秒', s3:'2.8秒', s4:'4秒', untitled:'無題', uploadHere:'作品をアップロード（原図比率のまま）', play:'プレビュー', stop:'停止',
    hint:'ローカルHTMLファイル。ダブルクリックで使え、デプロイ不要。画像と設定はローカル保存され、再読込でも消えません。作品チップはドラッグで並べ替え（＝スライド順）、▶ でプレビュー、動画は mp4 で書き出し。',
    generating:'生成中…', needImg:'先に作品を1枚以上アップロードしてください', videoDone:'✓ 動画を作成しました' },
};
const DEFAULT_TAGS = '#art #artwork #illustration #drawing #sketchbook #originalart #artistsoninstagram #contemporaryart';

const PALETTE = ['#3d3a44','#6b6675','#8a6f5e','#7d7a5b','#5f6f6a','#8a5c5c','#5c6b8a','#9b97a1'];
const PAPER='#f7f3ec', INK='#3d3a44', SOFT='#9b97a1';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const _images = {}; // id -> Image (decoded, in-memory)
let uid = 1;

// ---------------- IndexedDB image store (persist so images survive reload) ----------------
let _db=null;
function idb(){ return new Promise((res,rej)=>{ if(_db)return res(_db);
  const r=indexedDB.open('postmaker',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('img');
  r.onsuccess=()=>{_db=r.result;res(_db);}; r.onerror=()=>rej(r.error); }); }
async function idbPut(id,dataURL){ try{ const db=await idb(); await new Promise((res,rej)=>{ const tx=db.transaction('img','readwrite'); tx.objectStore('img').put(dataURL,id); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }catch(e){ console.warn('idb put',e); } }
async function idbDel(id){ try{ const db=await idb(); await new Promise(res=>{ const tx=db.transaction('img','readwrite'); tx.objectStore('img').delete(id); tx.oncomplete=res; tx.onerror=res; }); }catch(e){} }
async function idbGetAll(){ try{ const db=await idb(); return await new Promise(res=>{ const tx=db.transaction('img','readonly'); const st=tx.objectStore('img'); const ks=st.getAllKeys(), vs=st.getAll();
  tx.oncomplete=()=>{ const out={}; ks.result.forEach((k,i)=>out[k]=vs.result[i]); res(out); }; tx.onerror=()=>res({}); }); }catch(e){ return {}; } }
function loadImg(src){ return new Promise(res=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }

// ---------------- state ----------------
const saved = JSON.parse(localStorage.getItem('postmaker3')||'null');
const S = saved || {
  lang:'zh', sign:'', signFont:"'Mr Dafoe', cursive", accent:'#3d3a44', margin:0.085, align:'left',
  seriesTitle:'', hashtags:DEFAULT_TAGS, mode:'single', videoSecs:2.8,
  works:[{id:1, title:'', idea:'', date:new Date().toISOString().slice(0,10)}], current:0
};
if(!S.works||!S.works.length) S.works=[{id:1,title:'',idea:'',date:new Date().toISOString().slice(0,10)}];
uid = Math.max(...S.works.map(w=>w.id))+1;
function save(){ localStorage.setItem('postmaker3', JSON.stringify(S, (k,v)=> k[0]==='_'?undefined:v)); }
function t(k){ return (LANG[S.lang]||LANG.zh)[k]||k; }
function cur(){ return S.works[S.current]; }

// ---------------- language ----------------
function applyLang(){
  document.documentElement.lang = S.lang;
  document.querySelectorAll('[data-i18n]').forEach(el=> el.textContent = t(el.dataset.i18n));
  document.getElementById('title').placeholder = {zh:'例如：午后的窗台',en:'e.g. Afternoon Windowsill',ja:'例：午後の窓辺'}[S.lang];
  document.getElementById('idea').placeholder = {zh:'想表达的情绪、灵感来源…',en:'the feeling, the inspiration…',ja:'伝えたい感情、着想…'}[S.lang];
  document.getElementById('sign').placeholder = {zh:'你的名字',en:'your name',ja:'あなたの名前'}[S.lang];
  document.getElementById('seriesTitle').placeholder = {zh:'例如：四季手记',en:'e.g. Seasons',ja:'例：四季手帖'}[S.lang];
  document.getElementById('hint').textContent = t('hint');
  if(!_playing) document.getElementById('playPreview').textContent='▶ '+t('play');
  document.querySelectorAll('#langsel button').forEach(b=>b.classList.toggle('on', b.dataset.l===S.lang));
  buildCaption();
}
document.querySelectorAll('#langsel button').forEach(b=> b.onclick=()=>{ S.lang=b.dataset.l; save(); applyLang(); draw(); });

// ---------------- swatches & segments ----------------
const swEl=document.getElementById('swatches');
PALETTE.forEach(c=>{ const d=document.createElement('div'); d.className='sw'; d.style.background=c; d.dataset.c=c;
  d.onclick=()=>{ S.accent=c; syncSw(); save(); draw(); }; swEl.appendChild(d); });
function syncSw(){ [...swEl.children].forEach(d=>d.classList.toggle('on', d.dataset.c===S.accent)); }

function bindSeg(id,key,parse=v=>v,cb){ const box=document.getElementById(id);
  box.querySelectorAll('button').forEach(b=>{ const v=b.dataset.m??b.dataset.a??b.dataset.f??b.dataset.s??b.dataset.mode;
    b.onclick=()=>{ box.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); S[key]=parse(v); save(); (cb||draw)(); }; }); }
bindSeg('margin','margin',parseFloat);
bindSeg('textAlign','align');
bindSeg('signFont','signFont');
bindSeg('videoSecs','videoSecs',parseFloat,()=>{});
bindSeg('modetabs','mode',v=>v,()=>{ draw(); });

// ---------------- works list ----------------
const worksEl=document.getElementById('works');
let _dragIdx=null;
function renderWorks(){
  worksEl.innerHTML='';
  S.works.forEach((w,i)=>{
    const d=document.createElement('div'); d.className='wk'+(i===S.current?' on':''); d.draggable=true;
    if(_images[w.id]){ const im=document.createElement('img'); im.src=_images[w.id].src; d.appendChild(im); }
    else { const p=document.createElement('div'); p.className='ph'; p.textContent='▢'; d.appendChild(p); }
    const idx=document.createElement('div'); idx.className='idx'; idx.textContent=i+1; d.appendChild(idx);
    const rm=document.createElement('div'); rm.className='rm'; rm.textContent='×';
    rm.onclick=e=>{ e.stopPropagation(); removeWork(i); };
    d.appendChild(rm);
    d.onclick=()=>selectWork(i);
    // drag to reorder (the strip doubles as the slideshow timeline)
    d.ondragstart=()=>{ _dragIdx=i; d.classList.add('drag'); };
    d.ondragend=()=>d.classList.remove('drag');
    d.ondragover=e=>e.preventDefault();
    d.ondrop=e=>{ e.preventDefault(); if(_dragIdx===null||_dragIdx===i)return;
      const[m]=S.works.splice(_dragIdx,1); S.works.splice(i,0,m); S.current=i; _dragIdx=null;
      save(); renderWorks(); fillFields(); draw(); buildCaption(); };
    worksEl.appendChild(d);
  });
  const add=document.createElement('div'); add.className='wk add'; add.textContent='+';
  add.onclick=addWork; worksEl.appendChild(add);
}
function addWork(){ const w={id:uid++,title:'',idea:'',date:new Date().toISOString().slice(0,10)}; S.works.push(w); S.current=S.works.length-1; save(); renderWorks(); fillFields(); draw(); buildCaption(); }
function removeWork(i){ const rid=S.works[i].id; delete _images[rid]; idbDel(rid); S.works.splice(i,1); if(!S.works.length){ addWork(); return; } if(S.current>=S.works.length)S.current=S.works.length-1; save(); renderWorks(); fillFields(); draw(); buildCaption(); }
function selectWork(i){ S.current=i; save(); renderWorks(); fillFields(); draw(); buildCaption(); }
function fillFields(){ const w=cur(); document.getElementById('title').value=w.title||''; document.getElementById('idea').value=w.idea||''; document.getElementById('date').value=w.date||''; }

// ---------------- input bindings ----------------
['title','idea','date'].forEach(id=> document.getElementById(id).addEventListener('input',e=>{ cur()[id]=e.target.value; save(); draw(); buildCaption(); }));
['sign','seriesTitle','hashtags'].forEach(id=> document.getElementById(id).addEventListener('input',e=>{ S[id]=e.target.value; save(); draw(); buildCaption(); }));

// ---------------- upload ----------------
const drop=document.getElementById('drop'), file=document.getElementById('file');
drop.onclick=()=>file.click();
file.onchange=e=>loadFile(e.target.files[0]);
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>loadFile(e.dataTransfer.files[0]));
function loadFile(f){ if(!f||!f.type.startsWith('image/'))return; const r=new FileReader();
  r.onload=()=>{ const data=r.result; const id=cur().id; const im=new Image(); im.onload=()=>{ _images[id]=im; idbPut(id,data); renderWorks(); draw(); buildCaption(); }; im.src=data; }; r.readAsDataURL(f); }

// ---------------- helpers ----------------
function fmtDate(d){ if(!d)return''; const[y,m,dd]=d.split('-');
  if(S.lang==='en'){ const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${mn[+m-1]} ${+dd}, ${y}`; }
  if(S.lang==='ja') return `${y}年${+m}月${+dd}日`;
  return `${y} · ${m} · ${dd}`; }
function wrap(text,maxW){ const out=[]; for(const para of text.split(/\n/)){ if(para===''){out.push('');continue;}
  let line=''; const tok=para.match(/[一-鿿぀-ヿ，。、；：！？「」（）]|[^一-鿿぀-ヿ，。、；：！？「」（）\s]+|\s+/g)||[];
  for(const tk of tok){ const test=line+tk; if(ctx.measureText(test).width>maxW&&line.trim()){out.push(line.trimEnd());line=tk.replace(/^\s+/,'');} else line=test; }
  if(line.trim())out.push(line.trimEnd()); } return out; }
function contain(iw,ih,bw,bh){ const s=Math.min(bw/iw,bh/ih); return {w:iw*s,h:ih*s}; }
function worksWithImg(){ return S.works.filter(w=>_images[w.id]); }

// ---------------- single render (native ratio) ----------------
function drawSingle(g, work){
  const W=1080, A=S.accent, alignC=S.align==='center';
  const M=Math.round(W*S.margin), artX=M, artW=W-2*M, artY=M;
  const im=_images[work.id]; const imgAR=im?im.width/im.height:0.8; const artH=Math.round(artW/imgAR);
  const Ts=Math.round(W*0.0335), Is=Math.round(W*0.023), Sg=Math.round(W*0.058), lineH=Math.round(Is*1.6);
  g.font=`italic 400 ${Is}px 'Fraunces',serif`;
  const ideaLines = work.idea ? wrap(work.idea,artW) : [];
  const hasT=!!work.title, hasI=ideaLines.length>0, hasS=!!(S.sign||work.date);
  let capH=0; const gTop=Math.round(M*0.85);
  if(hasT)capH+=Math.round(Ts*1.18); if(hasT&&hasI)capH+=Math.round(Ts*0.35);
  if(hasI)capH+=ideaLines.length*lineH; if((hasT||hasI)&&hasS)capH+=Math.round(M*0.8); if(hasS)capH+=Math.round(Sg*0.95);
  const capTop=artY+artH+gTop, H=capTop+capH+Math.round(M*0.95);
  cv.width=W; cv.height=H;
  g.fillStyle=PAPER; g.fillRect(0,0,W,H);
  if(im) g.drawImage(im,artX,artY,artW,artH);
  else{ g.fillStyle='#fff'; g.fillRect(artX,artY,artW,artH); g.fillStyle=SOFT; g.font="500 25px 'Fredoka',sans-serif"; g.textAlign='center'; g.fillText(t('uploadHere'),artX+artW/2,artY+artH/2); g.textAlign='left'; }
  g.strokeStyle='rgba(61,58,68,.16)'; g.lineWidth=1.5; g.strokeRect(artX+.75,artY+.75,artW-1.5,artH-1.5);
  const cxL=alignC?W/2:artX; g.textAlign=alignC?'center':'left'; g.textBaseline='top'; let y=capTop;
  if(hasT){ g.fillStyle=INK; g.font=`500 ${Ts}px 'Fraunces',serif`; g.fillText(work.title,cxL,y,artW); y+=Math.round(Ts*1.18)+(hasI?Math.round(Ts*0.35):0); }
  if(hasI){ g.fillStyle='#6b6675'; g.font=`italic 400 ${Is}px 'Fraunces',serif`; ideaLines.forEach(l=>{g.fillText(l,cxL,y,artW); y+=lineH;}); }
  if((hasT||hasI)&&hasS) y+=Math.round(M*0.8);
  if(hasS){ g.textBaseline='alphabetic'; const sb=y+Math.round(Sg*0.7);
    if(alignC){ if(S.sign){g.font=`${Sg}px ${S.signFont}`;g.fillStyle=A;g.textAlign='center';g.fillText(S.sign,W/2,sb);}
      if(work.date){g.font=`500 ${Math.round(W*0.0205)}px 'Fraunces',serif`;g.fillStyle=SOFT;g.textAlign='center';g.letterSpacing='3px';g.fillText(fmtDate(work.date),W/2,sb+Math.round(Sg*0.42));g.letterSpacing='0px';} }
    else{ if(S.sign){g.font=`${Sg}px ${S.signFont}`;g.fillStyle=A;g.textAlign='left';g.fillText(S.sign,artX,sb);}
      if(work.date){g.font=`500 ${Math.round(W*0.0205)}px 'Fraunces',serif`;g.fillStyle=SOFT;g.textAlign='right';g.letterSpacing='3px';g.fillText(fmtDate(work.date),artX+artW,sb-Math.round(Sg*0.14));g.letterSpacing='0px';} }
    g.textAlign='left'; }
}

// ---------------- series grid render ----------------
function drawGrid(g){
  const W=1080, A=S.accent, WI=worksWithImg();
  const pad=Math.round(W*0.052), gap=Math.round(W*0.03);
  const n=Math.max(WI.length,1);
  const cols = n<=1?1 : n<=4?2 : 3;
  const rows=Math.ceil(n/cols);
  const cellW=Math.round((W-2*pad-(cols-1)*gap)/cols);
  const artBox=cellW;                       // square art region (contain, no crop)
  const tH=Math.round(W*0.034);             // small title strip per cell
  const cellH=artBox+tH;
  const headH = S.seriesTitle?Math.round(W*0.075):0;
  const footH = S.sign?Math.round(W*0.085):0;
  const top=pad+headH;
  const H=top+rows*cellH+(rows-1)*gap+footH+pad;
  cv.width=W; cv.height=H;
  g.fillStyle=PAPER; g.fillRect(0,0,W,H);
  // header
  if(S.seriesTitle){ g.fillStyle=INK; g.font=`500 ${Math.round(W*0.04)}px 'Fraunces',serif`; g.textAlign='center'; g.textBaseline='middle'; g.fillText(S.seriesTitle,W/2,pad+headH*0.42); }
  // cells
  WI.forEach((w,i)=>{ const r=Math.floor(i/cols), c=i%cols;
    const x=pad+c*(cellW+gap), y=top+r*(cellH+gap);
    const im=_images[w.id]; const {w:dw,h:dh}=contain(im.width,im.height,cellW,artBox);
    const dx=x+(cellW-dw)/2, dy=y+(artBox-dh)/2;
    g.drawImage(im,dx,dy,dw,dh);
    g.strokeStyle='rgba(61,58,68,.16)'; g.lineWidth=1.5; g.strokeRect(dx+.75,dy+.75,dw-1.5,dh-1.5);
    if(w.title){ g.fillStyle='#6b6675'; g.font=`italic 400 ${Math.round(W*0.019)}px 'Fraunces',serif`; g.textAlign='center'; g.textBaseline='middle'; g.fillText(w.title,x+cellW/2,y+artBox+tH*0.5,cellW); }
  });
  if(!WI.length){ g.fillStyle=SOFT; g.font="500 26px 'Fredoka',sans-serif"; g.textAlign='center'; g.textBaseline='middle'; g.fillText(t('uploadHere'),W/2,top+artBox/2); }
  // footer signature
  if(S.sign){ g.fillStyle=A; g.font=`${Math.round(W*0.05)}px ${S.signFont}`; g.textAlign='center'; g.textBaseline='middle'; g.fillText(S.sign,W/2,H-pad-footH*0.42); }
  g.textBaseline='alphabetic'; g.textAlign='left';
}

// ---------------- video frame render (fixed size, centered) ----------------
function drawVideoFrame(g,W,H,work){
  const A=S.accent, M=Math.round(W*0.085);
  const im=_images[work.id]; if(!im)return;
  const Ts=Math.round(W*0.04), Is=Math.round(W*0.026), Sg=Math.round(W*0.07), lineH=Math.round(Is*1.55);
  g.font=`italic 400 ${Is}px 'Fraunces',serif`;
  const ideaLines = work.idea?wrap(work.idea,W-2*M):[];
  const hasT=!!work.title, hasI=ideaLines.length>0, hasS=!!(S.sign||work.date);
  let capH=0; if(hasT)capH+=Math.round(Ts*1.2); if(hasT&&hasI)capH+=Math.round(Ts*0.4);
  if(hasI)capH+=ideaLines.length*lineH; if((hasT||hasI)&&hasS)capH+=Math.round(M*0.7); if(hasS)capH+=Math.round(Sg*0.9);
  const gap=Math.round(M*0.7);
  const artMaxH=H-2*M-capH-gap;
  const {w:dw,h:dh}=contain(im.width,im.height,W-2*M,artMaxH);
  const blockH=dh+gap+capH, topY=Math.max(M,(H-blockH)/2);
  const dx=(W-dw)/2, dy=topY;
  g.drawImage(im,dx,dy,dw,dh);
  g.strokeStyle='rgba(61,58,68,.16)'; g.lineWidth=2; g.strokeRect(dx+1,dy+1,dw-2,dh-2);
  let y=dy+dh+gap; g.textAlign='center'; g.textBaseline='top';
  if(hasT){ g.fillStyle=INK; g.font=`500 ${Ts}px 'Fraunces',serif`; g.fillText(work.title,W/2,y,W-2*M); y+=Math.round(Ts*1.2)+(hasI?Math.round(Ts*0.4):0); }
  if(hasI){ g.fillStyle='#6b6675'; g.font=`italic 400 ${Is}px 'Fraunces',serif`; ideaLines.forEach(l=>{g.fillText(l,W/2,y,W-2*M);y+=lineH;}); }
  if((hasT||hasI)&&hasS) y+=Math.round(M*0.7);
  if(hasS){ g.textBaseline='alphabetic'; const sb=y+Math.round(Sg*0.7);
    if(S.sign){ g.font=`${Sg}px ${S.signFont}`; g.fillStyle=A; g.fillText(S.sign,W/2,sb); }
    if(work.date){ g.font=`500 ${Math.round(W*0.024)}px 'Fraunces',serif`; g.fillStyle=SOFT; g.letterSpacing='3px'; g.fillText(fmtDate(work.date),W/2,sb+Math.round(Sg*0.42)); g.letterSpacing='0px'; } }
  g.textBaseline='alphabetic'; g.textAlign='left';
}

// ---------------- dispatch preview ----------------
function draw(){ if(S.mode==='grid') drawGrid(ctx); else drawSingle(ctx, cur()); }

// ---------------- caption + hashtags ----------------
function buildCaption(){
  const w=cur(); const lines=[];
  const titleLine = S.seriesTitle ? (w.title? `${S.seriesTitle} — ${w.title}` : S.seriesTitle) : w.title;
  if(titleLine) lines.push(S.lang==='en'?`“${titleLine}”`:`「${titleLine}」`);
  if(w.idea) lines.push(w.idea);
  const meta=[]; if(S.sign)meta.push(S.sign); if(w.date)meta.push(fmtDate(w.date));
  if(meta.length) lines.push((lines.length?'\n':'')+'— '+meta.join('，'.replace('，', S.lang==='en'?', ':' · ')));
  let cap=lines.join('\n');
  if(S.hashtags.trim()) cap+='\n\n'+S.hashtags.trim();
  document.getElementById('captionbox').textContent=cap;
  return cap;
}
document.getElementById('copyCap').onclick=async ()=>{ const cap=buildCaption();
  try{ await navigator.clipboard.writeText(cap); }catch(e){ const ta=document.createElement('textarea'); ta.value=cap; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
  const b=document.getElementById('copyCap'); b.textContent=t('copied'); setTimeout(()=>b.textContent=t('copyCap'),1400); };

// ---------------- export PNG ----------------
document.getElementById('exportPng').onclick=()=>{ draw();
  cv.toBlob(b=>{ const a=document.createElement('a');
    const base=(S.mode==='grid'?(S.seriesTitle||'series'):(cur().title||'artwork')).replace(/\s+/g,'_');
    a.download=`${base}_${cur().date||'post'}.png`; a.href=URL.createObjectURL(b); a.click(); },'image/png'); };

// ---------------- play slideshow preview in the canvas (like a lightweight CapCut preview) ----------------
let _playing=false;
const playBtn=document.getElementById('playPreview');
playBtn.onclick=()=>{ if(_playing){ _playing=false; return; } playPreview(); };
async function playPreview(){
  const WI=worksWithImg(); if(!WI.length){ alert(t('needImg')); return; }
  _playing=true; playBtn.textContent='■ '+t('stop');
  const W=1080,H=1350,secs=S.videoSecs,fade=Math.min(0.5,secs*0.3);
  cv.width=W; cv.height=H; const g=ctx;
  const total=WI.length*secs*1000, start=performance.now();
  await new Promise(res=>{ (function tick(){ if(!_playing){res();return;} const el=performance.now()-start; if(el>=total){res();return;}
    const ts=el/1000; let i=Math.min(WI.length-1,Math.floor(ts/secs)); const lo=ts-i*secs;
    let a=0; if(lo<fade)a=1-lo/fade; else if(lo>secs-fade)a=(lo-(secs-fade))/fade;
    g.fillStyle=PAPER; g.fillRect(0,0,W,H); drawVideoFrame(g,W,H,WI[i]);
    if(a>0){ g.globalAlpha=a; g.fillStyle=PAPER; g.fillRect(0,0,W,H); g.globalAlpha=1; }
    requestAnimationFrame(tick); })(); });
  _playing=false; playBtn.textContent='▶ '+t('play'); draw();
}

// ---------------- export slideshow video (mp4 / webm fallback) ----------------
const vBtn=document.getElementById('exportVideo');
vBtn.onclick=async ()=>{
  const WI=worksWithImg(); if(!WI.length){ alert(t('needImg')); return; }
  const W=1080,H=1350,fps=30,secs=S.videoSecs,fade=Math.min(0.5,secs*0.3);
  vBtn.disabled=true; const lbl=vBtn.textContent; vBtn.textContent=t('generating');
  try{
    const c=document.createElement('canvas'); c.width=W; c.height=H; const g=c.getContext('2d');
    g.fillStyle=PAPER; g.fillRect(0,0,W,H);
    const stream=c.captureStream(fps);
    // prefer real mp4 (Instagram-ready); fall back to webm on older browsers
    let mime='', ext='mp4';
    for(const m of ['video/mp4;codecs=avc1.42E01E','video/mp4']){ if(MediaRecorder.isTypeSupported(m)){mime=m;ext='mp4';break;} }
    if(!mime) for(const m of ['video/webm;codecs=vp9','video/webm']){ if(MediaRecorder.isTypeSupported(m)){mime=m;ext='webm';break;} }
    const rec=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:10000000});
    const chunks=[]; rec.ondataavailable=e=>{ if(e.data.size)chunks.push(e.data); };
    const stopped=new Promise(r=>rec.onstop=r);
    rec.start(); const total=WI.length*secs*1000, start=performance.now(), frameMs=1000/fps;
    // timer-driven loop (keeps running even if the tab is backgrounded, unlike rAF)
    await new Promise(res=>{ (function tick(){ const el=performance.now()-start; if(el>=total){res();return;}
      const ts=el/1000; let i=Math.min(WI.length-1,Math.floor(ts/secs)); const lo=ts-i*secs;
      let a=0; if(lo<fade)a=1-lo/fade; else if(lo>secs-fade)a=(lo-(secs-fade))/fade;
      g.fillStyle=PAPER; g.fillRect(0,0,W,H); drawVideoFrame(g,W,H,WI[i]);
      if(a>0){ g.globalAlpha=a; g.fillStyle=PAPER; g.fillRect(0,0,W,H); g.globalAlpha=1; }
      if(stream.getVideoTracks()[0] && stream.getVideoTracks()[0].requestFrame) stream.getVideoTracks()[0].requestFrame();
      setTimeout(tick, frameMs); })(); });
    rec.stop(); await stopped;
    const blob=new Blob(chunks,{type: ext==='mp4'?'video/mp4':'video/webm'}); const a=document.createElement('a');
    a.download=`${(S.seriesTitle||'series').replace(/\s+/g,'_')}_slideshow.${ext}`; a.href=URL.createObjectURL(blob); a.click();
    vBtn.textContent='✓ '+ext.toUpperCase(); setTimeout(()=>vBtn.textContent=lbl,1800);
  }catch(err){ console.error(err); alert('Video error: '+err.message); vBtn.textContent=lbl; }
  vBtn.disabled=false;
};

// ---------------- init ----------------
function init(){
  document.getElementById('sign').value=S.sign||'';
  document.getElementById('seriesTitle').value=S.seriesTitle||'';
  document.getElementById('hashtags').value=S.hashtags||DEFAULT_TAGS; S.hashtags=document.getElementById('hashtags').value;
  document.querySelectorAll('#margin button').forEach(b=>b.classList.toggle('on',parseFloat(b.dataset.m)===S.margin));
  document.querySelectorAll('#textAlign button').forEach(b=>b.classList.toggle('on',b.dataset.a===S.align));
  document.querySelectorAll('#signFont button').forEach(b=>b.classList.toggle('on',b.dataset.f===S.signFont));
  document.querySelectorAll('#videoSecs button').forEach(b=>b.classList.toggle('on',parseFloat(b.dataset.s)===S.videoSecs));
  document.querySelectorAll('#modetabs button').forEach(b=>b.classList.toggle('on',b.dataset.mode===S.mode));
  syncSw(); renderWorks(); fillFields(); applyLang(); draw();
  restoreImages();
}
async function restoreImages(){
  const stored=await idbGetAll(); let any=false;
  for(const w of S.works){ if(stored[w.id]){ const im=await loadImg(stored[w.id]); if(im){ _images[w.id]=im; any=true; } } }
  if(any){ renderWorks(); draw(); buildCaption(); }
}
if(document.fonts&&document.fonts.ready){
  Promise.all([
    document.fonts.load("400 60px 'Mr Dafoe'"), document.fonts.load("400 60px 'Mrs Saint Delafield'"),
    document.fonts.load("400 60px 'Pinyon Script'"), document.fonts.load("500 40px 'Fraunces'"),
    document.fonts.load("italic 400 30px 'Fraunces'"),
  ]).then(init).catch(init);
  document.fonts.ready.then(draw);
}else init();
</script>
